<!DOCTYPE html>
<html>
<head>
  <title>Even or Odd Checker</title>
</head>
<body>

  <h2>Enter a Number</h2>
  <input type="number" id="Input">

  <button onclick="
    let num = parseInt(document.getElementById('Input').value);

    if (num % 2 === 0) {
      console.log('The number is Even');
    } else {
      console.log('The number is Odd');
    }

    for (let i = 1; i <= num; i++) {
      console.log(i);
    }
  ">
    Submit
  </button>

</body>
</html>
